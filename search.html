<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТуТуТ</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css?v=2">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <img src="images/logo.svg" alt="ТуТуТ" class="logo-img logo-img-light">
                <img src="images/logo-dark.svg" alt="ТуТуТ" class="logo-img logo-img-dark">
            </a>
            <nav id="headerNav">
                <a href="index.html">Главная</a>
                <a href="search.html" class="active">Квартиры</a>
                <div id="authButtons"></div>
            </nav>
            <div class="header-right">
                <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
                    <img src="images/moon.png" alt="Тема" class="theme-icon-moon">
                    <img src="images/sun.png" alt="Тема" class="theme-icon-sun">
                </button>
                <button class="burger" id="burgerBtn" onclick="toggleMenu()">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="search-page">
        <div class="container">
            <div class="breadcrumbs">
                <a href="index.html">Главная</a>
                <span>/</span>
                <span class="current">Квартиры</span>
            </div>

            <h1 class="section-title">Квартиры в Оренбурге</h1>

            <div class="date-filter">
                <div>
                    <label>Заезд:</label>
                    <input type="date" id="checkinInput" min="2026-01-01" max="2026-12-31">
                </div>
                <div>
                    <label>Выезд:</label>
                    <input type="date" id="checkoutInput" min="2026-01-01" max="2026-12-31">
                </div>
            </div>

            <div class="listings-grid" id="listingsGrid"></div>
            <div class="no-results" id="noResults" style="display:none">
                Нет доступных квартир на выбранные даты
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>2016-2026 ТуТуТ — Сервис аренды квартир на сутки</p>
            <a href="#">Пользовательское соглашение</a>
        </div>
    </footer>

    <!-- Модалка входа -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('loginModal')">x</button>
            <h2>Вход в аккаунт</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email или телефон</label>
                    <input type="text" id="loginEmail" placeholder="example@mail.ru" required maxlength="100">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введите пароль" required maxlength="50">
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
            <div class="modal-footer">
                Нет аккаунта? 
                <a href="#" onclick="event.preventDefault(); closeModal('loginModal'); openModal('registerModal')">
                    Зарегистрироваться
                </a>
            </div>
        </div>
    </div>

    <!-- Модалка регистрации -->
    <div class="modal" id="registerModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('registerModal')">x</button>
            <h2>Регистрация</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>Ваше имя</label>
                    <input type="text" id="regName" placeholder="Иван" required maxlength="50">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="example@mail.ru" required maxlength="100">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" id="regPassword" placeholder="Минимум 6 символов" required minlength="6" maxlength="50">
                </div>
                <button type="submit" class="btn">Зарегистрироваться</button>
            </form>
            <div class="modal-footer">
                Уже есть аккаунт? 
                <a href="#" onclick="event.preventDefault(); closeModal('registerModal'); openModal('loginModal')">
                    Войти
                </a>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // Инициализация темы
        function initTheme() {
            var t = localStorage.getItem('theme');
            if (t === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else if (t === 'light') {
                document.documentElement.removeAttribute('data-theme');
            } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        }

        // Переключение темы
        function toggleTheme() {
            if (document.documentElement.hasAttribute('data-theme')) {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        // Переключение меню
        function toggleMenu() {
            document.getElementById('headerNav').classList.toggle('open');
            document.getElementById('burgerBtn').classList.toggle('open');
        }

        // Проверка авторизации
        function checkAuth() {
            var user = localStorage.getItem('user');
            var authDiv = document.getElementById('authButtons');
            
            if (user) {
                user = JSON.parse(user);
                var fl = user.name ? user.name.charAt(0).toUpperCase() : user.email.charAt(0).toUpperCase();
                var sn = user.name ? user.name.split(' ')[0] : user.email.split('@')[0];
                authDiv.innerHTML = 
                    '<div class="user-menu">' +
                        '<button class="user-btn" onclick="toggleUserMenu()">' +
                            '<span class="avatar">' + fl + '</span>' +
                            sn +
                        '</button>' +
                        '<div class="user-dropdown" id="userDropdown">' +
                            '<a href="profile.html">Личный кабинет</a>' +
                            '<a href="#" class="logout" onclick="logout()">Выйти</a>' +
                        '</div>' +
                    '</div>';
            } else {
                authDiv.innerHTML = '<button class="btn" onclick="openModal(\'loginModal\')">Вход</button>';
            }
        }

        function toggleUserMenu() {
            document.getElementById('userDropdown').classList.toggle('active');
        }

        document.addEventListener('click', function(e) {
            var d = document.getElementById('userDropdown');
            var b = document.querySelector('.user-btn');
            if (d && b && !b.contains(e.target) && !d.contains(e.target)) {
                d.classList.remove('active');
            }
        });

        function openModal(id) { 
            document.getElementById(id).classList.add('active'); 
        }
        
        function closeModal(id) { 
            document.getElementById(id).classList.remove('active'); 
        }

        document.querySelectorAll('.modal').forEach(function(m) {
            m.addEventListener('click', function(e) {
                if (e.target === m) m.classList.remove('active');
            });
        });

        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            var email = document.getElementById('loginEmail').value.trim();
            var user = { email: email, name: email.split('@')[0] };
            localStorage.setItem('user', JSON.stringify(user));
            closeModal('loginModal');
            checkAuth();
            this.reset();
        };

        document.getElementById('registerForm').onsubmit = function(e) {
            e.preventDefault();
            var name = document.getElementById('regName').value.trim();
            var email = document.getElementById('regEmail').value.trim();
            var user = { email: email, name: name };
            localStorage.setItem('user', JSON.stringify(user));
            closeModal('registerModal');
            checkAuth();
            this.reset();
            alert('Регистрация прошла успешно!');
        };

        function logout() {
            localStorage.removeItem('user');
            checkAuth();
        }

        // Получение параметров из URL
        var checkinParam = getUrlParameter('checkin');
        var checkoutParam = getUrlParameter('checkout');
        var checkinInput = document.getElementById('checkinInput');
        var checkoutInput = document.getElementById('checkoutInput');
        
        if (checkinParam) checkinInput.value = checkinParam;
        if (checkoutParam) checkoutInput.value = checkoutParam;

        var currentPhoto = {};

        // Показ квартир
        function showApartments() {
            var grid = document.getElementById('listingsGrid');
            var noResults = document.getElementById('noResults');
            var checkin = checkinInput.value;
            var checkout = checkoutInput.value;
            
            grid.innerHTML = '';
            var count = 0;
            
            for (var i = 0; i < apartments.length; i++) {
                var apt = apartments[i];
                
                if (!isCurrentlyAvailable(apt, checkin)) continue;
                
                if (checkin && checkout) {
                    if (isDateBooked(apt.id, checkin, checkout)) continue;
                }
                
                count++;
                currentPhoto[apt.id] = 0;
                
                // Превьюшки
                var thumbsHtml = '';
                var thumbCount = Math.min(apt.photos.length, 3);
                for (var t = 0; t < thumbCount; t++) {
                    thumbsHtml += '<img class="thumb ' + (t === 0 ? 'active' : '') + '" ' +
                        'src="' + apt.photos[t] + '" ' +
                        'data-apt="' + apt.id + '" ' +
                        'data-index="' + t + '">';
                }
                
                var morePhotos = '';
                if (apt.photos.length > 3) {
                    morePhotos = '<div class="more-photos">+' + (apt.photos.length - 3) + '</div>';
                }
                
                var link = 'card.html?id=' + apt.id;
                if (checkin) link += '&checkin=' + checkin;
                if (checkout) link += '&checkout=' + checkout;
                
                var tags = '<div class="tags">' +
                    '<span class="tag">' + apt.rooms + ' ' + getRoomsText(apt.rooms) + '</span>' +
                    '<span class="tag">' + apt.area + ' м2</span>' +
                    '<span class="tag">' + apt.floor + ' эт.</span>' +
                    '</div>';
                
                var card = '<div class="listing-card" onclick="window.location.href=\'' + link + '\'">';
                card += '<div class="listing-gallery">';
                card += '<img class="main-photo" id="main' + apt.id + '" src="' + apt.photos[0] + '" alt="">';
                card += '<div class="slider-btns">';
                card += '<button class="slider-btn" data-dir="-1" data-apt="' + apt.id + '">&lt;</button>';
                card += '<button class="slider-btn" data-dir="1" data-apt="' + apt.id + '">&gt;</button>';
                card += '</div>';
                card += morePhotos;
                card += '<div class="thumbnails">' + thumbsHtml + '</div>';
                card += '</div>';
                card += '<div class="listing-info">';
                card += '<h3>' + apt.name + '</h3>';
                card += '<div class="price">' + apt.price + ' руб <span>/ сутки</span></div>';
                card += '<p class="address">' + apt.city + ', ' + apt.address + '</p>';
                card += '<p class="desc">' + apt.description + '</p>';
                card += tags;
                card += '</div></div>';
                
                grid.innerHTML += card;
            }
            
            noResults.style.display = count == 0 ? 'block' : 'none';
            
            // Обработчики для кнопок слайдера
            document.querySelectorAll('.listing-gallery .slider-btn').forEach(function(btn) {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var aptId = parseInt(this.dataset.apt);
                    var dir = parseInt(this.dataset.dir);
                    slidePhoto(aptId, dir);
                });
            });
            
            // Обработчики для превьюшек
            document.querySelectorAll('.listing-gallery .thumb').forEach(function(thumb) {
                thumb.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var aptId = parseInt(this.dataset.apt);
                    var index = parseInt(this.dataset.index);
                    setPhoto(aptId, index);
                });
            });
        }

        function setPhoto(aptId, index) {
            var apt = apartments.find(function(a) { return a.id === aptId; });
            if (!apt) return;
            
            currentPhoto[aptId] = index;
            document.getElementById('main' + aptId).src = apt.photos[index];
            
            var gallery = document.getElementById('main' + aptId).closest('.listing-gallery');
            gallery.querySelectorAll('.thumb').forEach(function(th, ti) {
                th.classList.toggle('active', ti === index);
            });
        }

        function slidePhoto(aptId, dir) {
            var apt = apartments.find(function(a) { return a.id === aptId; });
            if (!apt) return;
            
            currentPhoto[aptId] += dir;
            if (currentPhoto[aptId] < 0) currentPhoto[aptId] = apt.photos.length - 1;
            if (currentPhoto[aptId] >= apt.photos.length) currentPhoto[aptId] = 0;
            
            setPhoto(aptId, currentPhoto[aptId]);
        }

        checkinInput.onchange = showApartments;
        checkoutInput.onchange = showApartments;

        initTheme();
        checkAuth();
        showApartments();
    </script>
</body>
</html>
